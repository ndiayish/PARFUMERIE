<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maison Senteur - Catalogue PRO</title>
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{background:#d63384;color:#fff;text-align:center;padding:15px}
header img{width:80px;height:80px;border-radius:10px;object-fit:cover;margin-bottom:10px}
.sub{font-size:14px;opacity:0.9}
.hero{width:100%;max-height:300px;object-fit:cover}
.produits{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;padding:20px}
.card{background:#fff;border-radius:10px;text-align:center;padding:10px;box-shadow:0 5px 10px rgba(0,0,0,0.1)}
.card img{width:100%;height:180px;object-fit:cover;border-radius:10px}
button{background:#25D366;color:#fff;border:none;padding:8px;margin:5px;cursor:pointer;border-radius:5px}
.panier{position:fixed;right:0;top:0;width:320px;height:100%;background:#fff;box-shadow:-5px 0 10px rgba(0,0,0,0.1);padding:15px;overflow:auto}
.panier h2{text-align:center}
.item{display:flex;justify-content:space-between;align-items:center;margin:5px 0}
.qty{display:flex;gap:5px}
.qty button{background:#d63384}
.supprimer{background:red}
footer{background:#fff;text-align:center;padding:10px;font-size:14px}
</style>
</head>
<body>

<header>
<img src="/mnt/data/7a8bdb63-964f-4335-9240-b8a74027c634.jpeg" alt="Maison Senteur Logo">
<h1>Maison Senteur 🌸</h1>
<p class="sub">Huiles & Parfums - 1500 FCFA</p>
<p class="sub">📞 781170866 | 💸 Wave: 781170866</p>
</header>

<!-- IMAGE BANNIERE PRODUIT -->
<img class="hero" src="/mnt/data/7a8bdb63-964f-4335-9240-b8a74027c634.jpeg" alt="Maison Senteur Banner">

<section class="produits">

<div class="card">
<img src="/mnt/data/fce92415-7413-40b1-82ea-c8513f869142.jpeg">
<h3>Baccarat Rouge</h3>
<p>1500 FCFA</p>
<button onclick="ajouter('Baccarat Rouge',1500)">Ajouter</button>
</div>

<div class="card">
<img src="/mnt/data/fce92415-7413-40b1-82ea-c8513f869142.jpeg">
<h3>Phantom</h3>
<p>1500 FCFA</p>
<button onclick="ajouter('Phantom',1500)">Ajouter</button>
</div>

<div class="card">
<img src="/mnt/data/fce92415-7413-40b1-82ea-c8513f869142.jpeg">
<h3>Nuit d’Orient</h3>
<p>1500 FCFA</p>
<button onclick="ajouter('Nuit d’Orient',1500)">Ajouter</button>
</div>

<div class="card">
<img src="/mnt/data/fce92415-7413-40b1-82ea-c8513f869142.jpeg">
<h3>Khamra</h3>
<p>1500 FCFA</p>
<button onclick="ajouter('Khamra',1500)">Ajouter</button>
</div>

<div class="card">
<img src="/mnt/data/fce92415-7413-40b1-82ea-c8513f869142.jpeg">
<h3>One Million</h3>
<p>1500 FCFA</p>
<button onclick="ajouter('One Million',1500)">Ajouter</button>
</div>

<div class="card">
<img src="/mnt/data/fce92415-7413-40b1-82ea-c8513f869142.jpeg">
<h3>Invictus</h3>
<p>1500 FCFA</p>
<button onclick="ajouter('Invictus',1500)">Ajouter</button>
</div>

</section>

<div class="panier">
<h2>🛒 Panier</h2>
<div id="liste"></div>
<p><strong>Total: <span id="total">0</span> FCFA</strong></p>
<button onclick="commander()">Commander sur WhatsApp</button>
</div>

<footer>
© Maison Senteur - WhatsApp 781170866 | Wave 781170866
</footer>

<script>
let panier = JSON.parse(localStorage.getItem('panier')) || [];

function sauvegarder(){localStorage.setItem('panier', JSON.stringify(panier));}

function ajouter(nom,prix){
let produit = panier.find(p => p.nom === nom);
if(produit){produit.qte++}
else{panier.push({nom,prix,qte:1})}
sauvegarder();
afficher();
}

function modifier(nom,delta){
let produit = panier.find(p => p.nom === nom);
if(produit){
produit.qte += delta;
if(produit.qte<=0){panier = panier.filter(p=>p.nom!==nom)}
}
sauvegarder();
afficher();
}

function supprimer(nom){
panier = panier.filter(p=>p.nom!==nom);
sauvegarder();
afficher();
}

function afficher(){
let liste=document.getElementById('liste');
let total=0;
liste.innerHTML='';

panier.forEach(p=>{
let div=document.createElement('div');
div.className='item';
div.innerHTML=`
<span>${p.nom} x${p.qte}</span>
<div class="qty">
<button onclick="modifier('${p.nom}',1)">+</button>
<button onclick="modifier('${p.nom}',-1)">-</button>
<button class="supprimer" onclick="supprimer('${p.nom}')">X</button>
</div>`;
liste.appendChild(div);
total+=p.prix*p.qte;
});

document.getElementById('total').textContent=total;
}

function commander(){
let message='Bonjour Maison Senteur, je veux commander :%0A';
let total=0;

panier.forEach(p=>{
message+=${p.nom} x${p.qte} - ${p.prix*p.qte} FCFA%0A;
total+=p.prix*p.qte;
});

message+='Total: '+total+' FCFA';
window.open('https://wa.me/221781170866?text='+message);
}

afficher();
</script>

</body>
</html>
